name: Build DDMJ Space Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Telegram activation secrets
        shell: bash
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN and TELEGRAM_ADMIN_CHAT_ID repository secrets are required."
            exit 1
          fi
          if [[ ! "$TELEGRAM_BOT_TOKEN" =~ ^[0-9]+:[A-Za-z0-9_-]{20,}$ ]]; then
            echo "::error::TELEGRAM_BOT_TOKEN is incomplete or has an invalid format."
            exit 1
          fi
          if [[ ! "$TELEGRAM_ADMIN_CHAT_ID" =~ ^-?[0-9]+$ ]]; then
            echo "::error::TELEGRAM_ADMIN_CHAT_ID must contain only the numeric chat ID."
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 repository secret is required for stable APK updates."
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore the permanent signing key from GitHub Secret
        shell: bash
        run: |
          ANDROID_KEYSTORE_PATH="$RUNNER_TEMP/ddmj-space-signing.p12"
          echo "ANDROID_KEYSTORE_PATH=$ANDROID_KEYSTORE_PATH" >> "$GITHUB_ENV"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          if [ ! -s "$ANDROID_KEYSTORE_PATH" ]; then
            echo "::error::Decoded signing key is empty."
            exit 1
          fi
          keytool -list -v \
            -storetype PKCS12 \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass android \
            -alias androiddebugkey |
          grep -E "SHA1:|SHA256:"

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
          cache-provider: basic

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Verify APK signing certificate
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs \
            app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ddmj-space-mobile.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ddmj-space-mobile-apk
          path: app/build/outputs/apk/debug/ddmj-space-mobile.apk
          if-no-files-found: error
